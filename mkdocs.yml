site_name: akaitools
site_description: Python library for parsing and analyzing AkaiKKR electronic structure output files
site_author: Doguhan Sariturk
repo_url: https://github.com/dogusariturk/akaitools
repo_name: dogusariturk/akaitools

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme)"
      scheme: slate
      primary: blue grey
      accent: cyan
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

  features:
    - toc.integrate
    - toc.follow
    - navigation.tabs
    - navigation.footer
    - navigation.tabs.sticky
    - navigation.instant
    - navigation.instant.progress
    - navigation.indexes
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - content.tooltips
    - search.suggest
    - search.highlight
    - search.share

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - footnotes
  - def_list
  - tables
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_bases: false
            show_source: false
            parameter_headings: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_toc: true
            show_signature: true
            show_signature_annotations: true

nav:
  - Home: index.md
  - Overview: overview.md
  - Installation & Quick Start: installation.md
  - Usage:
    - usage/index.md
    - SCF: usage/scf.md
    - DOS: usage/dos.md
    - SPC: usage/spc.md
    - Plotting: usage/plotting.md
    - DataFrame export: usage/dataframe.md
    - CLI: usage/cli.md
  - API Reference: api_reference.md
  - Troubleshooting: troubleshooting.md
  - FAQ: faq.md
