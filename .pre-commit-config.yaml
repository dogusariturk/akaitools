repos:

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.7
    hooks:
      - id: uv-lock

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff-check
        args: [ "--fix" ]
      - id: ruff-format

  # ty official pre-commit hook not yet released by Astral (tracked in astral-sh/ty#269).
  # Using local uvx hook as the safest option:
  - repo: local
    hooks:
      - id: ty
        name: ty type check
        language: system
        entry: uvx ty check
        types_or: [python, pyi]
        pass_filenames: false

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-case-conflict
      - id: mixed-line-ending
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
